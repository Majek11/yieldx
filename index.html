<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7C3AED" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>YieldX — AI-Powered Crypto Investment Platform</title>
  <meta name="description"
    content="YieldX is a next-generation AI-powered crypto investment platform offering automated portfolio management, DeFi yield strategies, and institutional-grade security." />
  <meta name="author" content="YieldX" />

  <meta property="og:title" content="YieldX — AI-Powered Crypto Investment" />
  <meta property="og:description"
    content="Grow your crypto portfolio with AI-managed funds and DeFi yield strategies." />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@YieldXio" />

  <!-- Google Fonts: Syne (headings) + Plus Jakarta Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet" />

  <!-- Google Translate -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: 'en',
          includedLanguages: 'en,es,fr,de,zh-CN,zh-TW,ja,ko,ar,pt,ru,hi,it,tr,vi,pl,nl,sv,id,ms,th',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false,
        },
        'google_translate_element'
      );
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    async></script>

  <style>
    /* Hide Google Translate top banner */
    .goog-te-banner-frame.skiptranslate {
      display: none !important;
    }

    body {
      top: 0 !important;
    }

    .goog-te-gadget {
      font-size: 0 !important;
    }

    .goog-te-gadget select {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px !important;
      background: hsl(228 40% 8%);
      color: #fff;
      border: 1px solid hsl(228 20% 15%);
      border-radius: 8px;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
    }
  </style>
</head>

<body>
  <div id="google_translate_element" style="display:none"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
